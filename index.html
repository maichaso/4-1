<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ちゃそてぃあ｜ファンテア[fantea]</title>
  <style>
    body {
      text-align: center;
      background-color: white;
      color: black;
      font-family: Arial;
      margin-top: 20%;
    }

    img {
      width: 80px;
      margin-bottom: 10px;
    }

    #sub {
      font-size: 18px;
      color: gray;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
    }

    #btn {
      font-size: 18px;
      padding: 10px 20px;
      background-color: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    video {
      display: none;
      width: 80%;
      margin-top: 20px;
    }

    /* 右下カウント */
    #counter {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 25px;
      color: gray;
      display: none;
    }
  </style>
</head>
<body>

<img src="スクリーンショット 2026-03-04 020113.png">

<p id="sub">https://fantea.jp/maichaso/1218</p>
<h1>外部サイトを開こうとしています。</h1>
<button id="btn">開く</button>

<video id="video" src="kari.mp4"></video>

<div id="counter"></div>

<script>
  const btn = document.getElementById("btn");
  const video = document.getElementById("video");
  const counter = document.getElementById("counter");

  let clickCount = 0;

  btn.onclick = () => {
    btn.style.display = "none";
    document.querySelector("img").style.display = "none";
    document.querySelector("h1").style.display = "none";
    document.getElementById("sub").style.display = "none";
    video.style.display = "block";
    video.play();

    counter.style.display = "block";
    counter.textContent = "11";
  };

  document.body.onclick = () => {
    if (video.style.display === "block") {
      video.currentTime = 0;
      video.play();

      clickCount++;

      let remaining = 11 - clickCount;

      if (remaining > 0) {
        counter.textContent = remaining;
      } else {
        counter.textContent = "0";
        window.location.href = "https://x.com/maichaso_VRC";
      }
    }
  };
</script>

</body>
</html>
