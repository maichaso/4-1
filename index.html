<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ちゃそてぃあ｜ファンテア[fantea]</title>
  <style>
    body {
      text-align: center;
      background-color: white;
      color: black;
      font-family: Arial;
      margin-top: 20%;
    }

    img {
      width: 80px;
      margin-bottom: 10px;
    }

    #sub {
      font-size: 18px;
      color: gray;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
    }

    #btn {
      font-size: 18px;
      padding: 10px 20px;
      background-color: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    video {
     display: none;
     position: fixed;
     top: 0;
     left: 0;
     width: 100vw;
     height: 100vh;
     object-fit: cover; /* 画面いっぱいに広げる */
     z-index: -1; /* 背景にする */
    }

    .spawn-img {
     position: fixed;
     width: 80px;
     pointer-events: none;
    }
    

  </style>
</head>
<body>

<img src="スクリーンショット 2026-03-04 020113.png">

<p id="sub">https://fantea.jp/maichaso/1218</p>
<h1>外部サイトを開こうとしています。</h1>
<button id="btn">開く</button>

<video id="video" src="kari.mp4" autoplay muted playsinline loop></video>

<div id="counter"></div>

<script>
  function createImage(x, y) {
  const img = document.createElement("img");
  img.src = "スクリーンショット 2026-03-04 020113.png";
  img.className = "spawn-img";

  img.style.left = x + "px";
  img.style.top = y + "px";

  document.body.appendChild(img);
  }

  const btn = document.getElementById("btn");
  const video = document.getElementById("video");
  const counter = document.getElementById("counter");

  let clickCount = 0;

  btn.onclick = () => {
    btn.style.display = "none";
    document.querySelector("img").style.display = "none";
    document.querySelector("h1").style.display = "none";
    document.getElementById("sub").style.display = "none";
    video.style.display = "block";
    video.play();

    createImage(
    window.innerWidth / 2 - 40,
    window.innerHeight / 2 - 40
    );

  };


document.body.addEventListener("click", (e) => {
  if (video.style.display === "block") {

    // ボタンは無視
    if (e.target.id === "btn") return;

    clickCount++;

    const x = Math.random() * (window.innerWidth - 80);
    const y = Math.random() * (window.innerHeight - 80);
    createImage(x, y);

    if (clickCount >= 10) {
      window.location.href = "https://x.com/maichaso_VRC";
    }
  }
});


</script>

</body>
</html>
